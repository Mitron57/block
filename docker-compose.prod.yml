# Продакшен: Managed PostgreSQL + три образа из Container Registry.
#   set -a && source .env.production && set +a
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  board-api:
    image: ${CR_IMAGE_API:-cr.yandex/<registry_id>/board-api:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      HOST: 0.0.0.0
      PORT: 3000
      RUST_LOG: ${RUST_LOG:-board_server=info,tower_http=info}
    expose:
      - "3000"

  frontend:
    image: ${CR_IMAGE_FRONTEND:-cr.yandex/<registry_id>/board-frontend:latest}
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: ${CR_IMAGE_PROXY:-cr.yandex/<registry_id>/board-proxy:latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - board-api
      - frontend
