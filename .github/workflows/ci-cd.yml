name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: board
          POSTGRES_PASSWORD: board
          POSTGRES_DB: board
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U board -d board"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://board:board@localhost:5432/board
      JWT_SECRET: integration-test-secret-32chars!!
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-workspaces: backend

      - name: Unit tests
        run: cargo test --lib

      - name: Integration tests (roles)
        run: cargo test --test role_access -- --include-ignored

  frontend-tests:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run lint

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy board-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: backend
        run: |
          railway link -p "${{ secrets.RAILWAY_PROJECT_ID }}" -e production -s board-api
          railway up --detach

      - name: Deploy frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: frontend
        run: |
          railway link -p "${{ secrets.RAILWAY_PROJECT_ID }}" -e production -s frontend
          railway up --detach

      - name: Deploy proxy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: proxy
        run: |
          railway link -p "${{ secrets.RAILWAY_PROJECT_ID }}" -e production -s proxy
          railway up --detach
